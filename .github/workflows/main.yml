name: Build and deploy .NET app to Azure App Service

on:
  push:
    branches:
      - main

  workflow_dispatch:
    

env:
  AZURE_WEBAPP_NAME: bad-goose
  AZURE_WEBAPP_PACKAGE_PATH: "./publish"
  DOTNET_VERSION: "10.0.x"
  PROJECT_PATH: "./MediaPlanApp/MediaPlanApp.csproj"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore '${{ env.PROJECT_PATH }}'

      - name: Build application
        run: dotnet build '${{ env.PROJECT_PATH }}' --configuration Release --no-restore

      - name: Publish application
        run: dotnet publish '${{ env.PROJECT_PATH }}' --configuration Release --no-build --output '${{ env.AZURE_WEBAPP_PACKAGE_PATH }}'

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}
